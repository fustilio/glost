name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  id-token: write # OIDC trusted publishing to npm

jobs:
  release:
    name: Version or publish packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 24 ships npm >= 11.5.1, required for the OIDC publish handshake.
          # Node 22 / npm 10 fails it with a misleading ENEEDAUTH / 404 (this bit
          # us on 2026-07-07: every package failed with "need auth" despite
          # trusted publishers being configured).
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter "!./examples/**" --filter "!./docs" -r build

      - name: Version or publish
        uses: changesets/action@v1
        with:
          # When changesets are present on main: opens/updates a "Version Packages" PR.
          # When the Version PR is merged (no pending changesets): runs the publish command.
          # Publishes via OIDC trusted publishing (pnpm >=10.16) — no NPM_TOKEN needed.
          # Each package must have a trusted publisher configured on npmjs.com
          # (repo: fustilio/glost, workflow: release.yml).
          version: pnpm changeset:version
          publish: pnpm changeset:release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
