name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build + test packages
    runs-on: ubuntu-latest

    # Scope: every package under `packages/*` (excludes `examples/*`, which
    # have stricter tsconfigs and unrelated issues). Builds in topo order
    # via pnpm's filter — workspace deps build before their consumers.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Excludes examples/** + docs (stricter tsconfigs, unrelated issues).
      - name: Build packages
        run: >-
          pnpm
          --filter "!./examples/**"
          --filter "!./docs"
          -r build

      - name: Test packages
        run: >-
          pnpm
          --filter "!./examples/**"
          --filter "!./docs"
          -r test
